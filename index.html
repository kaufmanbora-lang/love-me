<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ты меня любишь?</title>
    <style>
      :root {
        --rose: #ff2f68;
        --rose-dark: #c92655;
        --cream: #fff8ee;
        --sky: #e3f5ff;
        --ink: #542b39;
        --white: #ffffff;
        --shadow: 0 22px 55px rgba(128, 48, 77, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        color: var(--ink);
        font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
        background:
          linear-gradient(135deg, #ffe3eb 0%, var(--cream) 47%, var(--sky) 100%);
      }

      .page {
        position: relative;
        isolation: isolate;
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px 18px;
      }

      .page::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.22) 1px, transparent 1px),
          linear-gradient(rgba(255, 255, 255, 0.2) 1px, transparent 1px);
        background-size: 46px 46px;
        mask-image: linear-gradient(to bottom, transparent, #000 18%, #000 82%, transparent);
      }

      .love-shell {
        display: grid;
        width: min(100%, 780px);
        justify-items: center;
        gap: 20px;
        text-align: center;
      }

      .bears-frame {
        width: min(430px, 78vw);
        aspect-ratio: 1;
        padding: 10px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.78);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.48);
        box-shadow: var(--shadow);
      }

      .bears-frame img {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: 6px;
        object-fit: cover;
      }

      h1 {
        max-width: 100%;
        margin: 0;
        font-size: 3.65rem;
        line-height: 1.02;
        font-weight: 900;
        letter-spacing: 0;
        text-wrap: balance;
        text-shadow: 0 4px 0 rgba(255, 255, 255, 0.86);
      }

      .controls {
        position: relative;
        display: flex;
        min-height: 68px;
        align-items: center;
        justify-content: center;
        gap: 14px;
      }

      .choice {
        min-width: 128px;
        min-height: 56px;
        border: 0;
        border-radius: 8px;
        font: inherit;
        font-size: 1.25rem;
        font-weight: 900;
        line-height: 1;
        cursor: pointer;
        transition:
          transform 180ms ease,
          box-shadow 180ms ease,
          background-color 180ms ease;
      }

      .choice:focus-visible {
        outline: 4px solid rgba(255, 95, 142, 0.34);
        outline-offset: 4px;
      }

      .choice-yes {
        color: var(--white);
        background: linear-gradient(180deg, #ff7b9f 0%, var(--rose) 100%);
        box-shadow: 0 13px 28px rgba(255, 47, 104, 0.34);
      }

      .choice-yes:hover {
        transform: translateY(-3px) scale(1.03);
        box-shadow: 0 18px 34px rgba(255, 47, 104, 0.4);
      }

      .choice-no {
        color: var(--rose-dark);
        background: var(--white);
        box-shadow: 0 11px 26px rgba(121, 73, 88, 0.16);
      }

      .choice-no.is-running {
        position: fixed;
        z-index: 20;
        transition:
          left 240ms ease,
          top 240ms ease,
          transform 240ms ease;
      }

      .heart-screen {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: rgba(255, 244, 248, 0.94);
        opacity: 0;
        pointer-events: none;
        transition: opacity 300ms ease;
      }

      .heart-screen.show {
        opacity: 1;
        pointer-events: auto;
      }

      .big-heart,
      .floating-heart {
        position: relative;
        background: linear-gradient(135deg, #ff7ca0 0%, var(--rose) 72%);
        transform: rotate(-45deg);
      }

      .big-heart {
        width: 58vmin;
        height: 58vmin;
        filter: drop-shadow(0 28px 38px rgba(176, 28, 73, 0.36));
        opacity: 0;
      }

      .big-heart::before,
      .big-heart::after,
      .floating-heart::before,
      .floating-heart::after {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: inherit;
      }

      .big-heart::before,
      .floating-heart::before {
        top: -50%;
        left: 0;
      }

      .big-heart::after,
      .floating-heart::after {
        top: 0;
        left: 50%;
      }

      .heart-screen.show .big-heart {
        animation:
          heart-pop 760ms cubic-bezier(0.16, 1.2, 0.32, 1) forwards,
          heart-pulse 1450ms ease-in-out 760ms infinite;
      }

      .floating-heart {
        position: absolute;
        left: var(--x);
        bottom: -46px;
        width: var(--size);
        height: var(--size);
        opacity: 0;
        animation: float-up var(--time) ease-out var(--delay) forwards;
      }

      @keyframes heart-pop {
        0% {
          opacity: 0;
          transform: rotate(-45deg) scale(0.1);
        }

        70% {
          opacity: 1;
          transform: rotate(-45deg) scale(1.08);
        }

        100% {
          opacity: 1;
          transform: rotate(-45deg) scale(1);
        }
      }

      @keyframes heart-pulse {
        0%,
        100% {
          transform: rotate(-45deg) scale(1);
        }

        50% {
          transform: rotate(-45deg) scale(1.045);
        }
      }

      @keyframes float-up {
        0% {
          opacity: 0;
          transform: translateY(0) rotate(-45deg) scale(0.8);
        }

        16% {
          opacity: 0.9;
        }

        100% {
          opacity: 0;
          transform: translateY(-115vh) rotate(-45deg) scale(1.18);
        }
      }

      @media (max-width: 640px) {
        .page {
          padding: 22px 14px;
        }

        .love-shell {
          gap: 17px;
        }

        .bears-frame {
          width: min(310px, 80vw);
          padding: 8px;
        }

        h1 {
          font-size: 2.05rem;
        }

        .controls {
          gap: 10px;
        }

        .choice {
          min-width: 112px;
          min-height: 52px;
          font-size: 1.1rem;
        }

        .big-heart {
          width: 70vmin;
          height: 70vmin;
        }
      }

      @media (max-height: 680px) and (min-width: 641px) {
        .bears-frame {
          width: 310px;
        }

        h1 {
          font-size: 2.9rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 1ms !important;
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="love-shell" aria-label="Вопрос о любви">
        <div class="bears-frame">
          <img
            src="assets/hugging-bears-boys.png"
            width="1254"
            height="1254"
            alt="Два мультяшных медведя-мальчика обнимаются"
          >
        </div>

        <h1>Ты меня любишь?</h1>

        <div class="controls" aria-label="Выбор ответа">
          <button class="choice choice-no" id="noButton" type="button">Нет</button>
          <button class="choice choice-yes" id="yesButton" type="button">Да</button>
        </div>
      </section>
    </main>

    <div class="heart-screen" id="heartScreen" aria-hidden="true">
      <div class="big-heart" aria-hidden="true"></div>
    </div>

    <script>
      const noButton = document.querySelector("#noButton");
      const yesButton = document.querySelector("#yesButton");
      const heartScreen = document.querySelector("#heartScreen");

      function moveNoButton() {
        const padding = 16;
        const rect = noButton.getBoundingClientRect();
        const maxX = Math.max(padding, window.innerWidth - rect.width - padding);
        const maxY = Math.max(padding, window.innerHeight - rect.height - padding);
        const x = padding + Math.random() * (maxX - padding);
        const y = padding + Math.random() * (maxY - padding);
        const tilt = Math.random() * 28 - 14;

        noButton.classList.add("is-running");
        noButton.style.left = `${x}px`;
        noButton.style.top = `${y}px`;
        noButton.style.transform = `rotate(${tilt}deg)`;
      }

      function createFloatingHeart() {
        const heart = document.createElement("span");
        heart.className = "floating-heart";
        heart.style.setProperty("--x", `${Math.random() * 100}%`);
        heart.style.setProperty("--size", `${14 + Math.random() * 26}px`);
        heart.style.setProperty("--delay", `${Math.random() * 0.45}s`);
        heart.style.setProperty("--time", `${2.4 + Math.random() * 1.4}s`);
        heartScreen.appendChild(heart);

        heart.addEventListener("animationend", () => {
          heart.remove();
        });
      }

      function showLove() {
        heartScreen.classList.add("show");
        heartScreen.setAttribute("aria-hidden", "false");

        for (let i = 0; i < 34; i += 1) {
          createFloatingHeart();
        }
      }

      noButton.addEventListener("mouseenter", moveNoButton);
      noButton.addEventListener("focus", moveNoButton);
      noButton.addEventListener("click", (event) => {
        event.preventDefault();
        moveNoButton();
      });
      noButton.addEventListener(
        "touchstart",
        (event) => {
          event.preventDefault();
          moveNoButton();
        },
        { passive: false }
      );

      yesButton.addEventListener("click", showLove);

      window.addEventListener("resize", () => {
        if (noButton.classList.contains("is-running")) {
          moveNoButton();
        }
      });
    </script>
  </body>
</html>
